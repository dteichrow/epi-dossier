name: quality_gate

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/newsdesk-public-publish.yml"
      - ".github/workflows/quality-gate.yml"
      - "OPERATIONS.md"
      - "README.md"
      - "config/**"
      - "requirements.txt"
      - "scripts/**"
      - "src/**"
      - "tests/**"

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Repo health check
        run: python scripts/repo_doctor.py --json

      - name: Publisher configuration check
        run: python src/public_publish.py --check

      - name: Tests
        run: python -m pytest
