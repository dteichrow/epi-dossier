name: Deploy GitHub Pages

on:
  # Manual fallback only. The Newsdesk publisher already deploys after it writes
  # docs; auto-running this on the same push creates duplicate Pages deploys.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy docs to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url || steps.deployment_retry_2.outputs.page_url }}

    steps:
      - name: Check out public site
        uses: actions/checkout@v7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload public site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Let Pages settle before deployment
        run: sleep 45

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          reporting_interval: 10000
          error_count: 20

      - name: Wait before retrying Pages deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 75

      - name: Retry GitHub Pages deployment
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          reporting_interval: 10000
          error_count: 20

      - name: Wait before final Pages deployment retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: sleep 150

      - name: Final GitHub Pages deployment retry
        id: deployment_retry_2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        uses: actions/deploy-pages@v5
        with:
          reporting_interval: 10000
          error_count: 20
