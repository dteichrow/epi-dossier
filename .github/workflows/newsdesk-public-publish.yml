name: Newsdesk public publish

on:
  schedule:
    # Keep automated publishes sparse enough for GitHub Pages deployments to finish.
    # Use workflow_dispatch for urgent refreshes.
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/newsdesk-public-publish.yml"
      - "scripts/**"
      - "src/**"
      - "requirements.txt"
      - "config/**"
      - "data/**"
      - "graphics/**"

concurrency:
  group: newsdesk-public-publish
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    name: Build and publish Newsdesk
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PYTHON_VERSION: "3.12"
      TZ: America/Los_Angeles
      EPI_DOSSIER_PUBLIC_PUBLISH_TIMEOUT_SECONDS: "3300"
      EPI_DOSSIER_PUBLIC_PUBLISH_TEMP_ROOT: /tmp

    steps:
      - name: Check out epi-dossier
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh rsync

      - name: Install epi-dossier dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Verify publisher configuration
        run: .venv/bin/python src/public_publish.py --check

      - name: Publish Newsdesk
        if: >-
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'push' ||
          github.event_name == 'schedule'
        run: .venv/bin/python src/public_publish.py

  deploy:
    name: Deploy published Newsdesk to GitHub Pages
    needs: publish
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url || steps.deployment_retry_2.outputs.page_url }}

    steps:
      - name: Check out published main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload public site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Let Pages settle before deployment
        run: sleep 45

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          reporting_interval: 10000
          error_count: 20

      - name: Wait before retrying Pages deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 75

      - name: Retry GitHub Pages deployment
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          reporting_interval: 10000
          error_count: 20

      - name: Wait before final Pages deployment retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: sleep 150

      - name: Final GitHub Pages deployment retry
        id: deployment_retry_2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        uses: actions/deploy-pages@v5
        with:
          reporting_interval: 10000
          error_count: 20
