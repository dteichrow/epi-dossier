name: Newsdesk public publish

on:
  schedule:
    # Keep automated publishes sparse enough for GitHub Pages deployments to finish.
    # Use workflow_dispatch for urgent refreshes.
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/publish_public_site.sh"
      - "src/**"
      - "requirements.txt"
      - "config/**"
      - "data/**"
      - "graphics/**"

concurrency:
  group: newsdesk-public-publish
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    name: Build and publish Newsdesk
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PYTHON_VERSION: "3.12"
      TZ: America/Los_Angeles
      EPI_DOSSIER_PUBLIC_PUBLISH_TIMEOUT_SECONDS: "3300"
      EPI_DOSSIER_PUBLIC_PUBLISH_TEMP_ROOT: /tmp

    steps:
      - name: Check out epi-dossier
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system tools
        run: |
          set -euo pipefail

          missing=()
          command -v zsh >/dev/null 2>&1 || missing+=(zsh)
          command -v rsync >/dev/null 2>&1 || missing+=(rsync)

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "System tools already available: zsh rsync"
            exit 0
          fi

          # The GitHub-hosted runner can ship third-party apt sources that are
          # unrelated to this job. Keep those repos from breaking Newsdesk
          # publishing when their metadata is temporarily invalid.
          sudo find /etc/apt/sources.list.d \
            -maxdepth 1 \
            -type f \
            \( -iname "*microsoft*" -o -iname "*azure-cli*" \) \
            -print \
            -delete
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends "${missing[@]}"

      - name: Install epi-dossier dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Verify publisher configuration
        run: .venv/bin/python src/public_publish.py --check

      - name: Publish Newsdesk
        if: >-
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'push' ||
          github.event_name == 'schedule'
        run: .venv/bin/python src/public_publish.py
