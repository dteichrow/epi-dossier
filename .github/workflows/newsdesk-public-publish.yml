name: Newsdesk public publish

on:
  schedule:
    - cron: "17 * * * *"
    - cron: "47 * * * *"
    - cron: "5,20,35,50 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/newsdesk-public-publish.yml"
      - "scripts/**"
      - "src/**"
      - "requirements.txt"
      - "config/**"
      - "data/**"
      - "graphics/**"

concurrency:
  group: newsdesk-public-publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Build and publish Newsdesk
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PYTHON_VERSION: "3.12"
      TZ: America/Los_Angeles
      EPI_DOSSIER_PUBLIC_PUBLISH_TIMEOUT_SECONDS: "3300"
      EPI_DOSSIER_PUBLIC_PUBLISH_TEMP_ROOT: /tmp

    steps:
      - name: Check out epi-dossier
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh rsync

      - name: Install epi-dossier dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Verify publisher configuration
        run: .venv/bin/python src/public_publish.py --check

      - name: Publish Newsdesk
        if: >-
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'push' ||
          github.event.schedule == '17 * * * *' ||
          github.event.schedule == '47 * * * *'
        run: .venv/bin/python src/public_publish.py

      - name: Repair stale Newsdesk publish
        if: >-
          github.event_name == 'schedule' &&
          github.event.schedule != '17 * * * *' &&
          github.event.schedule != '47 * * * *'
        env:
          EPI_DOSSIER_WATCHDOG_STALE_MINUTES: "55"
          EPI_DOSSIER_WATCHDOG_CHECK_NEW_ITEMS: "true"
          EPI_DOSSIER_WATCHDOG_SEARCH_WINDOW_DAYS: "7"
        run: .venv/bin/python src/public_publish_watchdog.py
