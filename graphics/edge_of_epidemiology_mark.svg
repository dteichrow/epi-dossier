<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240" role="img" aria-labelledby="title desc">
  <title id="title">The Edge of Epidemiology mark</title>
  <desc id="desc">A restrained UCLA-inspired blue and gold editorial mark with a signal ring and wordmark.</desc>
  <rect width="720" height="240" fill="#F6F1E4"/>
  <g transform="translate(36 30)">
    <circle cx="78" cy="90" r="68" fill="none" stroke="#2774AE" stroke-width="10"/>
    <circle cx="78" cy="90" r="48" fill="none" stroke="#FFD24A" stroke-width="6" stroke-dasharray="4 10"/>
    <path d="M28 108 C48 76, 68 116, 88 84 C102 62, 119 90, 132 68" fill="none" stroke="#1B365D" stroke-width="8" stroke-linecap="round"/>
    <circle cx="28" cy="108" r="7" fill="#1B365D"/>
    <circle cx="48" cy="76" r="7" fill="#2774AE"/>
    <circle cx="68" cy="116" r="7" fill="#FFD24A"/>
    <circle cx="88" cy="84" r="7" fill="#1B365D"/>
    <circle cx="102" cy="62" r="7" fill="#2774AE"/>
    <circle cx="119" cy="90" r="7" fill="#FFD24A"/>
