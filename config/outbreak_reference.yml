diseases:
  - name: Hantavirus syndrome
    pathogen: Hantaviruses, including Andes virus in the Americas
    transmission: Rodent exposure; limited person-to-person transmission has been documented for Andes virus
    categories: ["Zoonotic", "Hemorrhagic / cardiopulmonary", "Emerging"]
    aliases: ["hantavirus", "andes virus", "hantavirus pulmonary syndrome", "hps"]
    reservoir_or_vector: "Wild rodents; Andes virus is especially associated with sigmodontine rodents in South America."
    incubation: "Usually 1 to 8 weeks after exposure."
    symptoms:
      - "Fever and severe myalgias after a prodromal phase."
      - "Rapid progression to cough, pulmonary edema, and cardiopulmonary compromise in severe cases."
      - "Thrombocytopenia and shock can appear in the more fulminant presentations."
    severity: "Potentially high fatality once cardiopulmonary syndrome develops."
    diagnostics: "PCR, serology, and exposure history are central; timing matters."
    treatment: "Supportive critical care, oxygenation, and hemodynamic support."
    prevention: "Rodent control, avoiding aerosolized rodent excreta, and close-contact precautions for suspected Andes virus clusters."
    vaccine_status: "No licensed routine human vaccine is in general public-health use."
    why_reporters_care: "This is a rare but frightening severe-disease story where a single unusual cluster can force questions about travel safety, rodent exposure, and whether Andes-virus-style person-to-person spread is in play."
    what_reporters_get_wrong: "Coverage often treats all hantaviruses as one epidemiologic problem, when the key distinction is whether the event looks like classic rodent exposure or the much rarer Andes-virus pattern with limited human-to-human spread."
    metrics_that_matter:
      - "Confirmed versus suspected cases, because panic often outruns laboratory certainty."
      - "Whether exposure points to rodents, enclosed lodging, or close-contact transmission."
      - "Severity markers such as ICU care, pulmonary edema, shock, and deaths."
    research_caveats: "Small case counts and heterogeneous hantavirus species mean early claims about transmission mode can be unstable."
    outbreak_settings: ["Rural rodent exposure", "Cabins and enclosed travel settings", "Field and agricultural work"]
    latest_outbreak:
      label: Cruise-ship linked cluster
      period: "April-May 2026"
      location: "Multi-country / maritime"
      summary: "WHO reported seven cases, including two laboratory-confirmed infections, three deaths, one critically ill patient and three mild suspected cases linked to cruise-ship travel."
      source_name: "WHO Disease Outbreak News"
      source_url: "https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON599"
      as_of: "2026-05-04"
    field_guide_links:
      - label: "WHO fact sheet"
        url: "https://www.who.int/news-room/fact-sheets/detail/hantavirus"
      - label: "CDC overview"
        url: "https://www.cdc.gov/hantavirus/"
    notable_outbreaks:
      - "Andes virus outbreaks in Argentina and Chile remain the canonical example of limited person-to-person hantavirus transmission."
    surveillance_note: "Useful for rare severe respiratory clusters with rodent ecology or unusual travel-linked spread."

  - name: Measles
    pathogen: Measles virus
    transmission: Airborne and respiratory
    categories: ["Vaccine-preventable", "Respiratory", "High-R0"]
    aliases: ["rubeola"]
    reservoir_or_vector: "Humans are the only reservoir."
    incubation: "Usually 7 to 14 days from exposure to rash onset."
    symptoms:
      - "Fever, cough, coryza, and conjunctivitis."
      - "Koplik spots can appear before rash."
      - "A descending maculopapular rash follows the prodrome."
    severity: "Can lead to pneumonia, encephalitis, and death, especially in under-immunized populations."
    diagnostics: "PCR and serology, paired with travel and exposure tracing."
    treatment: "Supportive care; vitamin A is relevant in specific clinical settings."
    prevention: "Two-dose measles vaccination and rapid outbreak control around exposed contacts."
    vaccine_status: "Highly effective routine vaccination exists; most outbreak stories are really immunity-gap stories."
    why_reporters_care: "Measles is a clean reporter desk disease because it reveals vaccination gaps, school and household spread, travel-linked importation, and public-health capacity all at once."
    what_reporters_get_wrong: "Reporters often overfocus on raw case counts and underplay outbreak size, exposure settings, and vaccination status, which are usually the more informative signals."
    metrics_that_matter:
      - "Confirmed cases and outbreak-associated cases rather than rumor-level totals."
      - "Vaccination status of cases and affected communities."
      - "School, childcare, household, and travel links that show whether containment is failing."
    research_caveats: "Administrative case totals and media tallies can lag or mix confirmed and probable cases across jurisdictions."
    outbreak_settings: ["Schools", "Households", "Travel-linked spread", "Under-immunized communities"]
    latest_outbreak:
      label: United States resurgence
      period: "2025"
      location: "United States, including major Texas-New Mexico spread"
      summary: "CDC's national measles summary reported 2,288 confirmed U.S. measles cases in 2025, with most cases outbreak-associated and many linked to outbreaks that crossed jurisdictions."
      source_name: "CDC Measles Cases and Outbreaks"
      source_url: "https://www.cdc.gov/measles/data-research/index.html"
      as_of: "2026-04-24 page update covering 2025 totals"
    field_guide_links:
      - label: "CDC overview"
        url: "https://www.cdc.gov/measles/about/index.html"
      - label: "WHO fact sheet"
        url: "https://www.who.int/news-room/fact-sheets/detail/measles"
    notable_outbreaks:
      - "2019 Democratic Republic of the Congo epidemic."
      - "2019 Samoa outbreak."
    surveillance_note: "This is the disease to watch when vaccination gaps, school clusters, or travel-linked introductions begin to stack."

  - name: Avian influenza A(H5N1)
    pathogen: Influenza A(H5N1)
    transmission: Animal-to-human exposure; no sustained person-to-person spread identified in the cited U.S. outbreak
    categories: ["Zoonotic", "Respiratory", "One Health"]
    aliases: ["h5n1", "bird flu", "avian flu"]
    reservoir_or_vector: "Wild birds, poultry, and now mammalian agricultural systems are central reservoirs and interfaces."
    incubation: "Usually a few days after exposure, though exact timing varies with exposure intensity."
    symptoms:
      - "Fever and respiratory illness."
      - "Conjunctivitis has been a recurring feature in some U.S. human cases."
      - "Severe pneumonia can develop in more serious infections."
    severity: "Severity ranges from mild conjunctivitis to severe respiratory disease with pandemic concern."
    diagnostics: "Influenza PCR with subtype characterization and exposure history are critical."
    treatment: "Antivirals such as oseltamivir remain important when indicated, alongside supportive care."
    prevention: "PPE for exposed workers, farm biosecurity, and aggressive animal surveillance."
    vaccine_status: "Human seasonal flu vaccines do not solve this problem; candidate H5 vaccines and animal-control measures matter more."
    why_reporters_care: "H5N1 is one of the few diseases where occupational exposure, food systems, animal surveillance, and pandemic-risk communications all converge in the same file."
    what_reporters_get_wrong: "Coverage often jumps straight to pandemic rhetoric without separating animal spillover, isolated human infection, and evidence of sustained person-to-person transmission."
    metrics_that_matter:
      - "Human case count and whether cases are mild, severe, or fatal."
      - "Exposure setting, especially dairy, poultry, culling work, and wild-bird interfaces."
      - "Any sign of household, healthcare, or unexplained transmission beyond direct animal exposure."
    research_caveats: "Risk estimates change fast because surveillance intensity varies by farm system, species, and jurisdiction."
    outbreak_settings: ["Dairy farms", "Poultry operations", "Culling and animal-handling work", "Wild-bird interfaces"]
    latest_outbreak:
      label: Multistate U.S. dairy and poultry outbreak
      period: "2024-2025"
      location: "United States"
      summary: "CDC described an ongoing multistate H5N1 outbreak in dairy cows, poultry and other animals, with 70 confirmed human infections in the United States since April 2024 and no identified person-to-person spread."
      source_name: "CDC Bird Flu Response Update"
      source_url: "https://www.cdc.gov/bird-flu/spotlights/h5n1-response-02262025.html"
      as_of: "2025-02-26"
    field_guide_links:
      - label: "CDC bird flu overview"
        url: "https://www.cdc.gov/bird-flu/about/index.html"
      - label: "WHO avian influenza fact sheet"
        url: "https://www.who.int/news-room/fact-sheets/detail/influenza-(avian-and-other-zoonotic)"
    notable_outbreaks:
      - "The current U.S. dairy-cattle episode changed the global H5N1 surveillance frame by moving the story deeper into mammalian agriculture."
    surveillance_note: "A top-tier reporter desk disease because animal, occupational, food-system and pandemic-risk lines all converge here."

  - name: Mpox
    pathogen: Monkeypox virus, including clade Ib and clade IIb
    transmission: Close physical contact, including sexual contact; household and healthcare transmission also occur
    categories: ["Emerging", "Contact transmission", "Global surveillance"]
    aliases: ["monkeypox", "clade ib mpox", "clade iib mpox"]
    reservoir_or_vector: "Animal reservoir remains incompletely defined; human-to-human transmission is central in current surveillance."
    incubation: "Often about 1 to 2 weeks, but can vary."
    symptoms:
      - "Fever, malaise, lymphadenopathy, and rash."
      - "Painful mucosal or genital lesions may dominate some current outbreak presentations."
      - "Rash burden and lesion distribution vary by clade and transmission network."
    severity: "Usually self-limited but can be severe in vulnerable patients and in settings with delayed diagnosis."
    diagnostics: "Lesion-based PCR is the practical core diagnostic tool."
    treatment: "Supportive care, infection control, and antivirals in selected higher-risk cases."
    prevention: "Risk communication, contact precautions, vaccination in defined settings, and rapid case finding."
    vaccine_status: "Vaccination exists but use is targeted, supply and strategy depend on context, and clade-specific framing still matters."
    why_reporters_care: "Mpox keeps generating news because social transmission networks, travel, stigma, clade differences, and global inequity collide in a single outbreak story."
    what_reporters_get_wrong: "The central mistake is flattening clade, route of spread, and affected networks into one undifferentiated global mpox narrative."
    metrics_that_matter:
      - "Clade and whether cases are imported or locally acquired."
      - "Household, healthcare, sexual-network, or congregate-setting transmission."
      - "Severity, pediatric involvement, and evidence of sustained spread outside the initial network."
    research_caveats: "Case ascertainment varies heavily with access to testing and with how stigmatized the exposed population is."
    outbreak_settings: ["Households", "Sexual networks", "Healthcare settings", "Congregate settings"]
    latest_outbreak:
      label: Broader clade Ib transmission
      period: "Late 2025"
      location: "Global"
      summary: "WHO reported broader transmission of clade Ib mpox, including locally acquired infections in multiple WHO regions and continued substantial outbreaks in African countries."
      source_name: "WHO Disease Outbreak News"
      source_url: "https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON587"
      as_of: "2025-12-05"
    field_guide_links:
      - label: "CDC overview"
        url: "https://www.cdc.gov/mpox/about/index.html"
      - label: "WHO fact sheet"
        url: "https://www.who.int/news-room/fact-sheets/detail/monkeypox"
    notable_outbreaks:
      - "The 2022 multi-country clade IIb outbreak remains the watershed event for modern global mpox reporting."
    surveillance_note: "The key distinction to preserve is clade, mode of spread, and whether cases are travel-linked or locally acquired."

  - name: Poliomyelitis / cVDPV2
    pathogen: Poliovirus, especially circulating vaccine-derived poliovirus type 2 in the cited event
    transmission: Fecal-oral, water and sanitation linked
    categories: ["Vaccine-preventable", "Enteric", "Eradication target"]
    aliases: ["polio", "cvdpv2", "vaccine-derived poliovirus"]
    reservoir_or_vector: "Humans are the reservoir; transmission is tightly linked to sanitation and immunity gaps."
    incubation: "Often 7 to 21 days for paralytic disease, though infection may be silent."
    symptoms:
      - "Most infections are asymptomatic."
      - "Mild febrile or gastrointestinal illness can occur."
      - "A small proportion progress to acute flaccid paralysis."
    severity: "The surveillance burden is driven by silent spread plus the catastrophic consequence of paralytic disease."
    diagnostics: "Stool testing, environmental surveillance, and genomic linkage are central."
    treatment: "Supportive care only."
    prevention: "Vaccination, sanitation, and aggressive outbreak response immunization."
    vaccine_status: "Vaccination remains the decisive preventive tool, but the key reporting distinction is wild poliovirus versus vaccine-derived poliovirus."
    why_reporters_care: "Polio is a near-eradication story where environmental detections, asymptomatic carriage, and vaccination politics matter as much as paralytic disease."
    what_reporters_get_wrong: "Coverage often waits for paralysis, when the actual public-health story is usually the silent circulation signal that appears first in sewage or healthy children."
    metrics_that_matter:
      - "Environmental detections and genomic linkage across sites."
      - "Whether any acute flaccid paralysis cases have been confirmed."
      - "Vaccination campaign scope, immunity gaps, and cross-border spread risk."
    research_caveats: "A single detection can matter a great deal, but risk interpretation depends on sequencing context and surveillance quality."
    outbreak_settings: ["Areas with low vaccination coverage", "Environmental sewage surveillance", "Conflict or weak infrastructure settings"]
    latest_outbreak:
      label: cVDPV2 detection in healthy children and environment
      period: "2025"
      location: "Papua New Guinea"
      summary: "WHO classified the Papua New Guinea cVDPV2 detections as a polio outbreak after linked type 2 poliovirus was found in environmental samples and in stool specimens from two healthy children in Morobe province."
      source_name: "WHO Disease Outbreak News"
      source_url: "https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON571"
      as_of: "2025-05-20"
    field_guide_links:
      - label: "CDC overview"
        url: "https://www.cdc.gov/polio/about/index.html"
      - label: "WHO fact sheet"
        url: "https://www.who.int/news-room/fact-sheets/detail/poliomyelitis"
    notable_outbreaks:
      - "Papua New Guinea also experienced a cVDPV1 outbreak in 2018."
    surveillance_note: "Environmental detections matter here even when paralytic disease is not yet evident."

  - name: Cholera
    pathogen: Vibrio cholerae
    transmission: Waterborne and sanitation linked
    categories: ["Waterborne", "Enteric", "Humanitarian settings"]
    aliases: ["acute watery diarrhea"]
    reservoir_or_vector: "Aquatic environments and contaminated water systems are the main ecological frame."
    incubation: "Usually hours to 5 days."
    symptoms:
      - "Profuse watery diarrhea."
      - "Vomiting and rapid dehydration."
      - "Shock can develop quickly without treatment."
    severity: "High mortality is preventable, but only if rehydration is rapid and accessible."
    diagnostics: "Clinical recognition in outbreak settings plus stool culture or rapid tests where available."
    treatment: "Aggressive oral or IV rehydration; antibiotics in selected cases."
    prevention: "Safe water, sanitation, hygiene, and oral cholera vaccine in appropriate campaigns."
    vaccine_status: "Oral cholera vaccines are important tools, but most reporting value still comes from infrastructure, access, and mortality context."
    why_reporters_care: "Cholera is one of the clearest diseases for showing how water, war, displacement, climate shocks, and state capacity become mortality."
    what_reporters_get_wrong: "Media often reduce cholera to a simple contamination story and miss the fact that treatment access and infrastructure collapse are what turn cases into mass death."
    metrics_that_matter:
      - "Cases, deaths, and case fatality ratio."
      - "Water-system failure, displacement, flooding, or conflict context."
      - "Treatment-center access and whether oral cholera vaccine campaigns are reaching the right places."
    research_caveats: "Counts are often underestimates, and suspected-case definitions can vary sharply across humanitarian settings."
    outbreak_settings: ["Refugee and displacement settings", "Flooding or infrastructure failure", "Urban water-system breakdown"]
    latest_outbreak:
      label: Ongoing global cholera upsurge
      period: "2026"
      location: "Multi-country"
      summary: "WHO's epidemiological update #36 reported 18,715 new cholera and acute watery diarrhoea cases and 269 deaths in February 2026 across 17 countries, with the highest burden in the African Region."
      source_name: "WHO Cholera Epidemiological Update #36"
      source_url: "https://www.who.int/publications/m/item/multi-country-outbreak-of-cholera--epidemiological-update--36--30-april-2026"
      as_of: "2026-04-30"
    field_guide_links:
      - label: "CDC overview"
        url: "https://www.cdc.gov/cholera/about/index.html"
      - label: "WHO fact sheet"
        url: "https://www.who.int/news-room/fact-sheets/detail/cholera"
    notable_outbreaks:
      - "The current WHO framing treats cholera as a prolonged global upsurge rather than a single isolated event."
    surveillance_note: "One of the clearest diseases where fragile infrastructure, displacement and mortality can move fast enough to outrun media attention."

  - name: Dengue
    pathogen: Dengue virus
    transmission: Aedes mosquitoes
    categories: ["Vector-borne", "Arbovirus", "Urban transmission"]
    aliases: ["severe dengue"]
    reservoir_or_vector: "Aedes aegypti and Aedes albopictus mosquitoes drive transmission."
    incubation: "Usually 4 to 10 days after an infectious mosquito bite."
    symptoms:
      - "Fever, headache, retro-orbital pain, and myalgias."
      - "Rash and leukopenia are common."
      - "A subset progress to severe dengue with plasma leakage or bleeding."
    severity: "Most illness is self-limited, but severe dengue can decompensate quickly."
    diagnostics: "PCR or antigen testing early, serology later, plus attention to exposure geography."
    treatment: "Supportive care with careful fluid management."
    prevention: "Mosquito control, bite avoidance, and vaccine policy where appropriate."
    vaccine_status: "Vaccines exist in a limited and policy-contingent way; most outbreak control still depends on vector ecology and clinical recognition."
    why_reporters_care: "Dengue is now one of the best climate-and-city disease stories on earth because mosquito range, urban crowding, and health-system stress all show up in it."
    what_reporters_get_wrong: "Coverage frequently treats dengue as a generic tropical fever and underplays serotype history, hospitalization pressure, and the difference between routine seasonal burden and exceptional surge."
    metrics_that_matter:
      - "Cases, severe dengue, hospitalizations, and deaths."
      - "Serotype shifts, if reported, because they can change severity expectations."
      - "Urban mosquito control failure and the pace of geographic expansion."
    research_caveats: "Reported case totals can surge when testing changes, and severity comparisons across countries are often not apples to apples."
    outbreak_settings: ["Dense urban settings", "Rainy seasons", "Expanding mosquito ranges"]
    latest_outbreak:
      label: Unprecedented global 2024 surge
      period: "2024"
      location: "Global, especially the Americas"
      summary: "WHO's 2024 update recorded 14,434,584 dengue cases worldwide, including 11,201 deaths, with more than 90% of reported cases coming from the Region of the Americas."
      source_name: "WHO Weekly Epidemiological Record"
      source_url: "https://www.who.int/publications/i/item/who-wer10052-665-678"
      as_of: "2025-12-26 publication covering 2024"
    field_guide_links:
      - label: "CDC overview"
        url: "https://www.cdc.gov/dengue/about/index.html"
      - label: "WHO fact sheet"
        url: "https://www.who.int/news-room/fact-sheets/detail/dengue-and-severe-dengue"
    notable_outbreaks:
      - "Brazil alone reported more than 10 million cases in the cited WHO 2024 update."
    surveillance_note: "This belongs near the top of any global outbreak desk because climate, vector range and urban vulnerability all keep widening the playing field."

  - name: Yellow fever
    pathogen: Yellow fever virus
    transmission: Mosquito-borne
    categories: ["Vector-borne", "Vaccine-preventable", "Sylvatic spillover"]
    aliases: ["yellow fever virus"]
    reservoir_or_vector: "Mosquito cycles involving non-human primates and humans define the classic ecology."
    incubation: "Usually 3 to 6 days."
    symptoms:
      - "Fever, headache, and myalgias in the early phase."
      - "A toxic phase can bring jaundice, bleeding, and organ failure."
      - "Not every case progresses to severe disease, but the severe end is dramatic."
    severity: "Potentially high fatality in the toxic phase."
    diagnostics: "PCR and serology, interpreted with vaccination history and geography."
    treatment: "Supportive care only."
    prevention: "Vaccination remains the decisive preventive tool."
    vaccine_status: "Vaccination is highly effective, so outbreaks are usually surveillance-and-coverage failures rather than biomedical mysteries."
    why_reporters_care: "Yellow fever matters because a rise in sylvatic spillover, urban encroachment, or vaccine gaps can turn a seemingly remote arbovirus story into a major regional emergency."
    what_reporters_get_wrong: "The common mistake is failing to distinguish forest-cycle spillover from the much scarier possibility of wider urban transmission."
    metrics_that_matter:
      - "Confirmed cases and deaths, especially in newly affected geography."
      - "Whether transmission remains sylvatic or shows signs of urban spread."
      - "Vaccination coverage, campaign timing, and traveler risk messaging."
    research_caveats: "Small outbreaks can still matter a lot, and cross-country comparisons are complicated by uneven surveillance and vaccination histories."
    outbreak_settings: ["Forest-edge exposure", "Mosquito-heavy tropical regions", "Areas with vaccine gaps"]
    latest_outbreak:
      label: Americas resurgence
      period: "2025"
      location: "Bolivia, Brazil, Colombia, Ecuador and Peru"
      summary: "WHO reported 212 confirmed yellow fever cases and 85 deaths in the Americas as of late April 2025, a threefold increase over 2024 totals."
      source_name: "WHO Disease Outbreak News"
      source_url: "https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON570"
      as_of: "2025-05-16"
    field_guide_links:
      - label: "CDC overview"
        url: "https://www.cdc.gov/yellow-fever/about/index.html"
      - label: "WHO fact sheet"
        url: "https://www.who.int/news-room/fact-sheets/detail/yellow-fever"
    notable_outbreaks:
      - "The cited WHO update notes spread beyond the Amazon region into places such as Sao Paulo and Tolima."
    surveillance_note: "When sylvatic transmission escapes its expected geography, this deserves very fast escalation."

  - name: Chikungunya
    pathogen: Chikungunya virus
    transmission: Aedes mosquitoes
    categories: ["Vector-borne", "Arbovirus", "Resurgent"]
    aliases: ["chikungunya virus"]
    reservoir_or_vector: "Aedes mosquitoes are central to transmission."
    incubation: "Typically 3 to 7 days."
    symptoms:
      - "Abrupt fever."
      - "Severe polyarthralgia or arthritis-like pain."
      - "Rash and prolonged joint symptoms can follow."
    severity: "Mortality is usually low, but disability burden can be substantial."
    diagnostics: "PCR early and serology later in the course."
    treatment: "Supportive care with pain control."
    prevention: "Vector control and bite avoidance remain central."
    vaccine_status: "No broadly used routine control vaccine anchors current outbreak response; vector control and public messaging remain central."
    why_reporters_care: "Chikungunya is a high-quality reporter disease because explosive outbreaks can be large, visually obvious, and politically disruptive even when mortality stays low."
    what_reporters_get_wrong: "It is often dismissed as a dengue-like illness, when the chronic joint-pain burden and workforce impact are a big part of the story."
    metrics_that_matter:
      - "Outbreak size and geographic spread."
      - "Vector range and travel-linked seeding into new places."
      - "Persistent disability burden, not just deaths."
    research_caveats: "Many surveillance systems blur suspected and confirmed cases, and long-term symptom burden is often undercounted."
    outbreak_settings: ["Urban mosquito transmission", "Tropical and subtropical outbreaks", "Travel-linked introductions"]
    latest_outbreak:
      label: 2025 global resurgence
      period: "2025"
      location: "Global"
      summary: "WHO reported 445,271 suspected and confirmed chikungunya cases and 155 deaths globally between 1 January and 30 September 2025, with outbreaks and resurgence across 40 countries."
      source_name: "WHO Disease Outbreak News"
      source_url: "https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON581"
      as_of: "2025-10-03"
    field_guide_links:
      - label: "CDC overview"
        url: "https://www.cdc.gov/chikungunya/about/index.html"
      - label: "WHO fact sheet"
        url: "https://www.who.int/news-room/fact-sheets/detail/chikungunya"
    notable_outbreaks:
      - "The 2005-2006 La Reunion epidemic remains one of the signature modern chikungunya reference points."
    surveillance_note: "A good desk will watch chikungunya alongside dengue because the vectors, differential and public-health burden overlap."

  - name: Ebola virus disease
    pathogen: Ebola viruses, including Bundibugyo virus in the current DRC/Uganda outbreak
    transmission: Direct contact with blood, body fluids or contaminated materials
    categories: ["Hemorrhagic fever", "High-fatality", "Outbreak containment"]
    aliases: ["ebola", "ebola virus disease", "ebolavirus", "orthoebolavirus", "bundibugyo", "bundibugyo virus", "bundibugyo ebolavirus", "bundibugyo virus disease", "viral hemorrhagic fever", "viral haemorrhagic fever"]
    reservoir_or_vector: "Fruit bats are the leading reservoir hypothesis; human amplification is contact-driven."
    incubation: "Usually 2 to 21 days."
    symptoms:
      - "Fever, weakness, gastrointestinal symptoms, and severe malaise."
      - "Bleeding is not universal but remains part of the classic frame."
      - "Rapid systemic deterioration can occur."
    severity: "High fatality potential and intense healthcare-system stress."
    diagnostics: "PCR with strict biosafety and rapid isolation protocols."
    treatment: "Supportive care is central. Species-specific countermeasures matter: approved Ebola Zaire tools should not be lazily assumed to solve a Bundibugyo outbreak."
    prevention: "Isolation, PPE, safe burials, contact tracing, and vaccination where available."
    vaccine_status: "Vaccination can be decisive for some Ebola species and response settings, but Bundibugyo-specific vaccine and therapeutic availability remains a central uncertainty in the 2026 outbreak."
    why_reporters_care: "Ebola remains a defining outbreak-desk disease because healthcare transmission, funeral practices, laboratory capacity, community trust, and international alarm can all move faster than the confirmed count."
    what_reporters_get_wrong: "Coverage often defaults to cinematic fatality framing or distant-risk reassurance and misses the operational details that determine control: isolation delays, healthcare spread, burial practices, contact follow-up, laboratory turnaround, and whether the headline count is lagging the epidemic."
    metrics_that_matter:
      - "Suspected, probable, confirmed, and ruled-out cases by health zone and report date."
      - "Deaths inside and outside formal care, especially community deaths and healthcare-worker deaths."
      - "Contact tracing performance: listed contacts, high-risk contacts, follow-up completeness, symptomatic contacts, and contacts lost to follow-up."
      - "Laboratory pipeline: samples collected, tested locally, sent to reference labs, indeterminate results, and turnaround time."
      - "Cross-border and urban signals: imported cases, airport or border screening, capital-city care, and whether a place is a transmission site or a detection/care site."
      - "Countermeasure reality: PPE, isolation beds, IPC support, safe burial teams, vaccine candidates, therapeutics, and operational research timelines."
    research_caveats: "Early Ebola counts are often an accounting artifact as much as an epidemic curve. When access, insecurity, transport, and laboratory confirmation lag, suspected cases and deaths can be a better warning signal than confirmed cases alone."
    outbreak_settings: ["Healthcare settings", "Households", "Funeral transmission chains", "Mining and mobile work zones", "Border corridors", "Urban referral hospitals"]
    latest_outbreak:
      label: 2026 Bundibugyo Ebola outbreak
      period: "April 2026-present"
      location: "Ituri Province, DRC, with imported cases reported in Kampala, Uganda"
      summary: "Africa CDC declared the ongoing Bundibugyo ebolavirus disease outbreak affecting DRC and Uganda a Public Health Emergency of Continental Security on 18 May 2026, reporting about 395 suspected cases and 106 associated deaths in DRC and two cases with one death in Kampala, Uganda."
