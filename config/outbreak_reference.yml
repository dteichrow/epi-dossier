        url: "https://www.cdc.gov/pertussis/about/index.html"
      - label: "WHO fact sheet"
        url: "https://www.who.int/news-room/fact-sheets/detail/pertussis"
    notable_outbreaks:
      - "Pertussis repeatedly reminds reporters that vaccine-preventable does not mean epidemiologically solved."
    surveillance_note: "Worth keeping on the desk because infant risk, school spread, and booster debates all make it newsy."

  - name: Meningococcal disease
    pathogen: Neisseria meningitidis
    transmission: Respiratory and close-contact spread
    categories: ["Bacterial", "Respiratory", "Meningitis belt"]
    aliases: ["meningococcal", "meningococcal meningitis", "meningococcemia"]
    reservoir_or_vector: "Humans are the reservoir; transmission often intensifies in crowded settings."
    incubation: "Usually 3 to 4 days, with a broader range of about 2 to 10 days."
    symptoms:
      - "Abrupt fever, headache, and neck stiffness in meningitis presentations."
      - "Petechial or purpuric rash can signal invasive bloodstream disease."
      - "Clinical deterioration can be rapid enough to make same-day recognition decisive."
    severity: "High-stakes disease because fulminant sepsis and meningitis can progress quickly and kill rapidly."
    diagnostics: "Blood culture, CSF evaluation, PCR, and public-health serogrouping are all important."
    treatment: "Immediate empiric antibiotics and intensive supportive care."
    prevention: "Vaccination, chemoprophylaxis for close contacts, and fast cluster investigation."
    vaccine_status: "Vaccination is central, but the real desk issue is which serogroup is circulating and how quickly control measures are moving."
    why_reporters_care: "Meningococcal disease is intensely newsworthy because it is fast, terrifying, often affects schools or young adults, and can force rapid public-health action."
    what_reporters_get_wrong: "Coverage often treats every case as a generic meningitis story and misses the importance of invasive disease, serogroup, and contact prophylaxis."
    metrics_that_matter:
      - "Confirmed invasive cases and deaths."
      - "Serogroup, because it changes vaccine and response implications."
      - "Dormitory, campus, military, or meningitis-belt cluster context."
    research_caveats: "Single severe cases attract huge attention, but outbreak significance depends on linkage, serogroup, and public-health confirmation."
    outbreak_settings: ["Dormitories", "Military settings", "Crowded communities", "Sahel meningitis belt"]
    latest_outbreak:
      label: Expanding meningitis belt pressure
      period: "2024-2025"
      location: "West and Central Africa"
      summary: "WHO and regional reporting have continued to emphasize recurrent meningococcal meningitis pressure across meningitis-belt countries, where serogroup shifts and strained health systems can rapidly change outbreak control needs."
      source_name: "WHO meningitis fact sheet"
      source_url: "https://www.who.int/news-room/fact-sheets/detail/meningitis"
      as_of: "WHO fact sheet"
    field_guide_links:
      - label: "CDC overview"
        url: "https://www.cdc.gov/meningococcal/about/index.html"
      - label: "WHO meningitis fact sheet"
        url: "https://www.who.int/news-room/fact-sheets/detail/meningitis"
    notable_outbreaks:
      - "Serogroup changes have repeatedly altered the control picture across the African meningitis belt."
    surveillance_note: "This belongs on the desk because local clusters can become national panic stories very quickly."

  - name: Malaria
    pathogen: Plasmodium parasites, especially Plasmodium falciparum and Plasmodium vivax
    transmission: Anopheles mosquitoes
    categories: ["Vector-borne", "Parasitic", "Endemic burden"]
    aliases: ["plasmodium falciparum", "plasmodium vivax"]
    reservoir_or_vector: "Anopheles mosquitoes are the transmission vector; humans are the main reservoir in most settings."
    incubation: "Often 7 to 30 days, depending on species and immunity."
    symptoms:
      - "Fever, chills, headache, and malaise."
      - "Severe malaria can involve anemia, cerebral disease, acidosis, or organ failure."
      - "Travel history and exposure ecology remain fundamental to suspicion."
    severity: "A chronic global emergency with severe disease and death concentrated in young children and vulnerable populations."
    diagnostics: "Rapid diagnostic tests and microscopy remain the field core, with PCR for selected contexts."
    treatment: "Artemisinin-based combination therapy for uncomplicated malaria; IV artesunate for severe disease."
    prevention: "Bed nets, vector control, chemoprevention, seasonal prevention strategies, and vaccination in some settings."
    vaccine_status: "Vaccination is now part of the toolkit in some settings, but nets, vector control, and treatment access still dominate the burden story."
    why_reporters_care: "Malaria is a foundational global-health reporting file because it links endemic burden, climate, resistance, conflict, childhood mortality, and rural neglect."
    what_reporters_get_wrong: "Coverage often waits for a spectacular outbreak frame and misses the fact that routine seasonal or conflict-linked surges are already major epidemiologic events."
    metrics_that_matter:
      - "Cases, deaths, and severe disease burden in children."
      - "Rainfall, displacement, stock-outs, and vector-control breakdown."
      - "Drug and insecticide resistance signals."
    research_caveats: "Routine surveillance often underestimates burden, and comparisons across countries depend heavily on testing access and reporting completeness."
    outbreak_settings: ["Rural endemic districts", "Rainy-season surges", "Conflict and displacement settings"]
    latest_outbreak:
      label: Persistent high-burden global transmission
      period: "2024-2025"
      location: "Sub-Saharan Africa and beyond"
      summary: "WHO's recent malaria reporting continues to frame malaria less as a single outbreak than as a persistent high-burden transmission crisis shaped by insecticide resistance, climate variability, and health-system fragility."
      source_name: "WHO malaria fact sheet"
      source_url: "https://www.who.int/news-room/fact-sheets/detail/malaria"
      as_of: "WHO fact sheet"
    field_guide_links:
      - label: "CDC overview"
        url: "https://www.cdc.gov/malaria/about/index.html"
      - label: "WHO malaria fact sheet"
        url: "https://www.who.int/news-room/fact-sheets/detail/malaria"
    notable_outbreaks:
      - "For a desk product, seasonal or conflict-linked malaria spikes matter even when they are under-covered as news."
    surveillance_note: "Malaria deserves broader retrieval because a lot of important rural transmission news never gets framed as a headline outbreak."

  - name: Norovirus
    pathogen: Norovirus
    transmission: Fecal-oral, foodborne, waterborne, and environmental contamination
    categories: ["Enteric", "Foodborne", "Cruise and congregate settings"]
    aliases: ["stomach bug", "viral gastroenteritis", "cruise ship norovirus"]
    reservoir_or_vector: "Humans and contaminated environments are the practical outbreak reservoir frame."
    incubation: "Usually 12 to 48 hours."
    symptoms:
      - "Abrupt vomiting and diarrhea."
      - "Abdominal cramps and low-grade fever are common."
      - "Explosive facility outbreaks are typical."
    severity: "Usually self-limited but highly disruptive, especially for institutions and travel settings."
    diagnostics: "PCR panels, outbreak epidemiology, and facility investigation."
    treatment: "Supportive care and rehydration."
    prevention: "Hand hygiene, environmental cleaning, exclusion of ill food handlers, and rapid institution-level control."
    vaccine_status: "No routine population vaccine drives present-day outbreak control."
    why_reporters_care: "Norovirus is highly useful for a desk because it produces the kind of explosive local outbreak that readers immediately understand, especially on cruise ships and in institutions."
    what_reporters_get_wrong: "It is often treated as trivial because mortality is low, but the real story is rapid attack rate, institutional disruption, and public confidence."
    metrics_that_matter:
      - "Attack rate and facility type."
      - "Cruise, school, long-term-care, or food-service setting."
      - "Whether the source is environmental, person-to-person, or foodborne."
    research_caveats: "Local outbreaks are numerous and inconsistently reported, so media visibility can badly misrepresent actual burden."
    outbreak_settings: ["Cruise ships", "Long-term care", "Schools", "Food-service outbreaks"]
    latest_outbreak:
      label: Recurring cruise and institutional outbreaks
      period: "Ongoing"
      location: "Global"
      summary: "Norovirus remains one of the most recurrent outbreak categories for cruise ships, schools, and long-term-care facilities, with rapid attack rates and heavy local reporting but inconsistent national attention."
      source_name: "CDC overview"
      source_url: "https://www.cdc.gov/norovirus/about/index.html"
      as_of: "CDC overview"
    field_guide_links:
      - label: "CDC overview"
        url: "https://www.cdc.gov/norovirus/about/index.html"
      - label: "WHO outbreak resources"
        url: "https://www.who.int/teams/integrated-health-services/food-safety"
    notable_outbreaks:
      - "Cruise-ship outbreaks keep reminding editors that enormous audience interest can attach to pathogens that are usually medically self-limited."
    surveillance_note: "This is one of the most reliable high-volume local outbreak categories and should be surfaced more aggressively."

  - name: Cyclosporiasis
    pathogen: Cyclospora cayetanensis
    transmission: Foodborne and waterborne fecal contamination; direct person-to-person spread is not the usual route.
    categories: ["Enteric", "Foodborne", "Produce-associated outbreaks"]
    aliases: ["cyclospora", "cyclospora cayetanensis", "cyclospora infection"]
    reservoir_or_vector: "Human fecal contamination of food or water is the practical outbreak frame; fresh produce has been implicated repeatedly in prior North American outbreaks."
    incubation: "Usually about one week, with a reported range of roughly 2 days to 2 weeks or more."
    symptoms:
      - "Prolonged or relapsing watery diarrhea, often with abdominal cramping, bloating, nausea, anorexia, and weight loss."
      - "Dehydration and delayed clinical recognition can drive the practical burden, especially in younger, older, or immunocompromised people."
    severity: "Usually not life-threatening, but outbreaks can be large, prolonged, and disruptive; severe dehydration and delayed diagnosis matter."
    diagnostics: "Laboratories need a Cyclospora-specific stool test or molecular gastrointestinal panel; routine ova-and-parasite testing may not include it."
    treatment: "Trimethoprim-sulfamethoxazole is the usual treatment when indicated, with hydration and clinical assessment for more severe illness."
    prevention: "Source tracing, produce-control measures, safe food handling, and rapid provider awareness; washing alone may not eliminate risk from contaminated produce."
    vaccine_status: "No vaccine is available."
    why_reporters_care: "Cyclospora can produce a large, fast-moving foodborne cluster before a specific product is identified, making state surveillance and laboratory testing more informative than early recall speculation."
    what_reporters_get_wrong: "A produce-associated outbreak does not establish a specific food vehicle. Early case growth, cross-border clustering, and a missing source are signals to follow, not proof about lettuce, berries, or any restaurant chain."
    metrics_that_matter:
      - "Case counts, hospitalizations, onset window, and the number of affected jurisdictions."
      - "Whether officials have identified a common exposure, product, grower, or supplier."
      - "Provider-testing guidance and evidence of delayed recognition or under-testing."
    research_caveats: "State counts can move quickly as laboratories add targeted testing and retrospective case finding. Similar illness clusters across states do not by themselves prove a single multistate outbreak."
    outbreak_settings: ["Fresh-produce supply chains", "Restaurants and food-service settings", "Cross-border state clusters"]
    latest_outbreak:
      label: Large and growing cyclosporiasis outbreak
      period: "July 2026"
      location: "Southeast Michigan, with related Ohio surveillance concern"
      summary: "MDHHS reported 784 Michigan cases since June 22 as of July 7, 2026, while the source investigation remained unresolved. The state warned that standard stool testing may miss Cyclospora unless it is specifically requested."
      source_name: "Michigan Department of Health and Human Services provider bulletin"
      source_url: "https://www.michigan.gov/mdhhs/-/media/Project/Websites/mdhhs/Keeping-Michigan-Healthy/Public-Health-Admin/Bulletins/Cyclosporiasis-Provider-Bulletin-NB-Copy.pdf"
      as_of: "2026-07-07"
    field_guide_links:
      - label: "CDC Cyclospora overview"
        url: "https://www.cdc.gov/cyclosporiasis/about/index.html"
      - label: "MDHHS infectious disease updates"
        url: "https://www.michigan.gov/mdhhs/keep-mi-healthy/infectious-diseases"
    notable_outbreaks:
      - "North American Cyclospora outbreaks have repeatedly been linked to fresh produce, but the food vehicle often remains unresolved early in investigation."
    surveillance_note: "A sudden state-level rise is a serious signal even before a recall exists. The practical question is whether the increase reflects one source, several clusters, improved testing, or a combination of all three."

  - name: Hepatitis A
    pathogen: Hepatitis A virus
    transmission: Fecal-oral, foodborne, and close-contact spread
    categories: ["Enteric", "Vaccine-preventable", "Foodborne"]
    aliases: ["hepatitis a virus", "hav"]
    reservoir_or_vector: "Humans are the reservoir; sanitation and food handling drive much of the outbreak frame."
    incubation: "Usually 15 to 50 days."
    symptoms:
      - "Fever, malaise, nausea, abdominal discomfort, and jaundice."
      - "Children can have milder or asymptomatic infection."
      - "Large foodborne and community outbreaks remain classic scenarios."
    severity: "Often self-limited but can be severe, especially in older adults or those with liver disease."
    diagnostics: "Serologic confirmation with IgM plus outbreak tracing."
    treatment: "Supportive care."
    prevention: "Vaccination, sanitation, food-safety control, and post-exposure prophylaxis where indicated."
    vaccine_status: "Vaccination is effective, but outbreak stories often hinge on whether local policy actually reached at-risk adults and unstable living settings."
    why_reporters_care: "Hepatitis A is useful because it can move between foodborne recall, encampment, homelessness, travel, and sanitation stories without changing pathogen."
    what_reporters_get_wrong: "Coverage often assumes every hepatitis A event is a restaurant or food-recall story, when prolonged person-to-person transmission can be the bigger issue."
    metrics_that_matter:
      - "Confirmed cases, hospitalizations, and deaths."
      - "Foodborne versus community transmission setting."
      - "Vaccination and post-exposure response among high-risk contacts."
    research_caveats: "Long incubation makes exposure reconstruction difficult, so early source attribution can be shaky."
    outbreak_settings: ["Food-service settings", "Encampments and homelessness-related outbreaks", "Travel-linked foodborne clusters"]
    latest_outbreak:
      label: Recurrent foodborne and community outbreaks
      period: "Ongoing"
      location: "Global"
      summary: "Modern hepatitis A reporting repeatedly centers on foodborne clusters and prolonged community transmission in settings with sanitation stress or low vaccination coverage."
      source_name: "CDC overview"
      source_url: "https://www.cdc.gov/hepatitis-a/about/index.html"
      as_of: "CDC overview"
    field_guide_links:
      - label: "CDC overview"
        url: "https://www.cdc.gov/hepatitis-a/about/index.html"
      - label: "WHO fact sheet"
        url: "https://www.who.int/news-room/fact-sheets/detail/hepatitis-a"
    notable_outbreaks:
      - "Large U.S. person-to-person outbreaks in the late 2010s remain an important recent reference point."
    surveillance_note: "Hepatitis A is a good example of a disease that toggles between local sanitation story, foodborne recall story, and vaccination story."

  - name: Rabies
    pathogen: Rabies virus and related lyssaviruses
    transmission: Animal bites and saliva exposure
    categories: ["Zoonotic", "High-fatality", "Neglected tropical"]
    aliases: ["dog rabies", "lyssavirus"]
    reservoir_or_vector: "Dogs remain the main source of human rabies globally, though wildlife reservoirs matter regionally."
    incubation: "Usually weeks to months, but highly variable."
    symptoms:
      - "Early fever and paresthesia at the bite site can precede neurologic illness."
      - "Hydrophobia, aerophobia, agitation, or paralysis mark advanced disease."
      - "Once clinical disease begins, the prognosis is overwhelmingly poor."
    severity: "Essentially universally fatal once symptomatic, which is why exposure response is the real public-health battleground."
    diagnostics: "Exposure assessment is central; laboratory confirmation often comes late and may require specialized testing."
    treatment: "Post-exposure prophylaxis before symptoms; supportive care after disease onset."
    prevention: "Dog vaccination, bite prevention, and rapid access to post-exposure prophylaxis."
    vaccine_status: "Pre-exposure vaccination is selective, but the real population-level control tool is dog vaccination plus reliable access to post-exposure prophylaxis."
    why_reporters_care: "Rabies remains one of the starkest diseases in communications because nearly every symptomatic human case is a preventable systems failure."
    what_reporters_get_wrong: "Coverage often fixates on the horror of symptomatic disease and underreports the policy issue that actually matters: whether bite victims can get prompt prophylaxis."
    metrics_that_matter:
      - "Access to post-exposure prophylaxis and immunoglobulin."
      - "Dog vaccination coverage and bite-source ecology."
      - "Whether cases are clustered in rural underserved areas."
    research_caveats: "Human case counts are often severe underestimates because diagnostic confirmation is limited where burden is highest."
    outbreak_settings: ["Rural dog-bite exposure", "Wildlife interfaces", "Areas with weak post-exposure prophylaxis access"]
    latest_outbreak:
      label: Persistent rural dog-mediated burden
      period: "Ongoing"
      location: "Africa and Asia"
      summary: "WHO continues to frame rabies as a preventable but still deadly disease concentrated in underserved settings where dog vaccination and post-exposure prophylaxis access remain inadequate."
      source_name: "WHO fact sheet"
      source_url: "https://www.who.int/news-room/fact-sheets/detail/rabies"
      as_of: "WHO fact sheet"
    field_guide_links:
      - label: "CDC overview"
        url: "https://www.cdc.gov/rabies/about/index.html"
      - label: "WHO fact sheet"
        url: "https://www.who.int/news-room/fact-sheets/detail/rabies"
    notable_outbreaks:
      - "For desk purposes, rabies matters because devastating local stories keep happening even when rich-country editors barely notice."
    surveillance_note: "This is exactly the kind of severe rural infectious-disease burden that can disappear if the intake is too urban and too English-headline dependent."
