  - name: PubMed Infectious Disease Search
    type: pubmed
    category: Major epidemiology studies
    official: true
    search: "(infectious disease OR epidemiology OR outbreak OR surveillance OR virology OR occupational exposure OR historical epidemiology OR paleopathology) AND (\"last 7 days\"[PDat])"
    max_items: 25

  - name: PubMed Historical Epidemiology
    type: pubmed
    category: Historical epidemiology / ancient disease / paleopathology
    official: true
    historical_relevance: true
    refresh_hours: 12
    search: "((paleopathology[Title/Abstract] OR paleomicrobiology[Title/Abstract] OR archaeogenetics[Title/Abstract] OR paleogenomics[Title/Abstract] OR \"historical epidemiology\"[Title/Abstract] OR \"ancient disease\"[Title/Abstract] OR \"ancient pathogen\"[Title/Abstract]) AND (infectious[Title/Abstract] OR pathogen[Title/Abstract] OR epidemic[Title/Abstract] OR plague[Title/Abstract] OR tuberculosis[Title/Abstract] OR leprosy[Title/Abstract] OR treponemal[Title/Abstract] OR syphilis[Title/Abstract] OR cholera[Title/Abstract] OR smallpox[Title/Abstract] OR variola[Title/Abstract] OR salmonella[Title/Abstract]))"
    max_items: 30

  - name: PubMed Ancient Pathogen Genomics
    type: pubmed
    category: Historical epidemiology / ancient disease / paleopathology
    official: true
    historical_relevance: true
    refresh_hours: 12
    search: "(((\"ancient DNA\"[Title/Abstract] OR \"ancient genome\"[Title/Abstract] OR \"pathogen aDNA\"[Title/Abstract] OR \"ancient metagenomics\"[Title/Abstract]) AND (pathogen[Title/Abstract] OR pathogens[Title/Abstract] OR Yersinia[Title/Abstract] OR tuberculosis[Title/Abstract] OR leprosy[Title/Abstract] OR treponema[Title/Abstract] OR plague[Title/Abstract] OR variola[Title/Abstract] OR \"hepatitis B\"[Title/Abstract] OR Salmonella[Title/Abstract])) OR (\"ancient pathogen\"[Title/Abstract]))"
    max_items: 30

  - name: PubMed Historical Pathogen Case Studies
    type: pubmed
    category: Historical epidemiology / ancient disease / paleopathology
    official: true
    historical_relevance: true
    refresh_hours: 12
    search: "(((\"Yersinia pestis\"[Title/Abstract]) OR plague[Title/Abstract] OR smallpox[Title/Abstract] OR variola[Title/Abstract] OR leprosy[Title/Abstract] OR \"Mycobacterium leprae\"[Title/Abstract] OR \"Mycobacterium tuberculosis\"[Title/Abstract] OR treponemal[Title/Abstract] OR syphilis[Title/Abstract] OR tuberculosis[Title/Abstract]) AND ((\"ancient DNA\"[Title/Abstract]) OR paleopathology[Title/Abstract] OR archaeology[Title/Abstract] OR skeletal[Title/Abstract] OR burial[Title/Abstract] OR cemetery[Title/Abstract] OR mummified[Title/Abstract] OR medieval[Title/Abstract] OR prehistoric[Title/Abstract] OR historical[Title/Abstract]))"
    max_items: 30

  - name: medRxiv Infectious Disease
    type: medrxiv
    category: Major epidemiology studies
    official: false
    search: "infectious disease OR epidemiology OR outbreak OR surveillance OR public health"
    max_items: 40

  - name: bioRxiv Infectious Disease
    type: biorxiv
    category: Virology and pathogen evolution
    official: false
    search: "infectious disease OR virology OR pathogen evolution OR ancient DNA pathogen"
    max_items: 40

  - name: bioRxiv Ancient Pathogen and Archaeogenetics
    type: biorxiv
    category: Historical epidemiology / ancient disease / paleopathology
    official: false
    historical_relevance: true
    search: "ancient DNA pathogen OR ancient pathogen OR paleogenomics OR archaeogenetics OR paleomicrobiology OR pathogen aDNA OR ancient genome"
    max_items: 40

