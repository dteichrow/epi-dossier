  - slug: hantavirus
    name: Hantavirus syndrome
    subtitle: Rodent ecologies, Andes-virus exceptions, and climate-linked exposure zones
    status: mixed
    pathogen_type: Virus
    summary: "Hantavirus deserves atlas treatment not because it has one clean colonial route, but because it is a good counterexample: multiple rodent-linked ecologies, geographically distinct syndromes, and one especially important Andes-virus exception."
    why_it_matters: It prevents the atlas from becoming a simplistic shipping story and forces us to represent ecology, exposure setting, and uncertainty honestly.
    atlas_scope: American rodent-borne ecologies with Andes-virus person-to-person concern
    origin_claim:
      label: Multiple rodent-host lineages across Eurasia and the Americas
      coordinates: [-71.0, -41.5]
      date_or_era: Twentieth-century recognition, older rodent-host evolution
      confidence: moderate
      narrative: There is no single simple modern origin pin for all hantaviruses; the atlas entry instead foregrounds the American rodent ecologies relevant to severe cardiopulmonary disease and the Andes-virus exception.
    spread_routes:
      - route_id: hantavirus-andes-cone
        from_label: Southern Andes rodent ecologies
        to_label: Argentina and Chile cluster zones
        from_coordinates: [-71.0, -41.5]
        to_coordinates: [-70.7, -42.9]
        date_or_era: Late twentieth century to present
        route_type: ecological
        confidence: strong
        narrative: Andes virus clusters in southern South America remain the most important person-to-person exception within hantavirus reporting.
        citation_ids: [hanta-review, hanta-nejm]
      - route_id: hantavirus-rural-latin-america
        from_label: Rural Latin American rodent exposure settings
        to_label: Cabin, field, and enclosed-travel outbreaks
        from_coordinates: [-63.0, -17.0]
        to_coordinates: [-72.0, -13.0]
        date_or_era: Contemporary rural and travel-linked events
        route_type: exposure_setting
        confidence: moderate
        narrative: The practical route is often less about human travel chains than about where rodent exposure becomes intense enough to generate severe disease clusters.
        citation_ids: [hanta-review, hanta-climate]
    modern_echoes:
      - Travelers, field workers, and rural residents encounter the map through cabins, farm structures, and rodent disturbance rather than metropolitan corridors.
      - Andes-virus concern makes it one of the rare stories where a hantavirus map may suddenly become a transmission map.
    framing_traps:
      - Do not write all hantaviruses as though they shared the same transmission pattern.
      - Do not overclaim person-to-person spread unless the evidence really points to Andes virus or a closely analogous setting.
    linked_reference_slug: hantavirus-syndrome
    linked_story_ids: []
    linked_blog_posts: []
    citations:
      - id: hanta-review
        short_citation: Hjelle B, Torres-Pérez F. Hantaviruses in the Americas and their role as emerging pathogens. Viruses. 2010.
        url: https://doi.org/10.3390/v2032559
        claim_supported: American hantavirus ecology and the importance of rodent-host geography.
        note: Broad review of hantavirus emergence in the Americas.
      - id: hanta-nejm
        short_citation: Martínez-Valdebenito C, Calvo M, Vial C et al. Person-to-person household and nosocomial transmission of Andes hantavirus, southern Chile, 2011. Emerg Infect Dis. 2014.
        url: https://doi.org/10.3201/eid2008.131936
        claim_supported: Andes-virus person-to-person transmission as the key exception.
        note: Specific evidence for the atlas caution layer.
      - id: hanta-climate
        short_citation: "Douglas KO, Payne K, Sabino-Santos G et al. Influence of climatic factors on human hantavirus infections in Latin America and the Caribbean: A systematic review. Pathogens. 2022."
        url: https://doi.org/10.3390/pathogens11010015
        claim_supported: Climate and landscape conditions affecting hantavirus geography in Latin America and the Caribbean.
        note: Useful for the ecology panel.
